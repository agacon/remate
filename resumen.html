<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resumen — AGACON</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--green:#1B8A4A;--blue:#2E75B6;--gold:#B0750A;--red:#C0392B;--muted:#5B667A;--border:#E3E8F0;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#F5F7FA;color:#1a2333;padding:14px}
  .summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.7rem}
  @media(max-width:820px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .icon-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:.35rem}
  .ic-green{background:#E7F7EE;color:#1B8A4A}.ic-blue{background:#E7F0FA;color:#2E75B6}.ic-gold{background:#FBF3E0;color:#B0750A}.ic-red{background:#FDECEC;color:#C0392B}
  .sv{font-size:1.8rem;font-weight:900;font-family:"Courier New",monospace;line-height:1}
  .sl{font-size:.66rem;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:.25rem}
  .chart-box{margin-top:1rem;background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem}
  .chart-title{margin:0 0 .9rem;font-size:.95rem;font-weight:800;color:#1a2333}
  .chart-row{display:flex;align-items:center;gap:1.6rem;flex-wrap:wrap}
  .pie{width:180px;height:180px;border-radius:50%;flex-shrink:0;background:#eee;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .legend{display:flex;flex-direction:column;gap:.55rem;flex:1;min-width:200px}
  .leg-item{display:flex;align-items:center;gap:.55rem;font-size:.9rem}
  .leg-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}
  .leg-name{font-weight:600;text-transform:capitalize}
  .leg-val{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .muted{color:var(--muted);font-size:.78rem}
  #err{display:none;background:#FDECEC;color:#C0392B;border:1px solid #F7C9C5;border-radius:8px;padding:.6rem .9rem;font-size:.85rem;margin-bottom:.8rem}
</style>
</head>
<body>
  <div id="err"></div>
  <div class="summary-grid">
    <div class="stat-card"><div class="icon-badge ic-green">✓</div><div class="sv" id="as-lotes" style="color:#1B8A4A">0</div><div class="sl">Lotes</div></div>
    <div class="stat-card"><div class="icon-badge ic-green">🐄</div><div class="sv" id="as-cabezas" style="color:#1B8A4A">0</div><div class="sl">Total cabezas</div></div>
    <div class="stat-card"><div class="icon-badge ic-blue">$</div><div class="sv" id="as-monto" style="color:#2E75B6;font-size:1.2rem">$0</div><div class="sl">Monto $US</div></div>
    <div class="stat-card"><div class="icon-badge ic-gold">%</div><div class="sv" id="as-comision" style="color:#B0750A;font-size:1.2rem">$0</div><div class="sl">Comisión total</div></div>
    <div class="stat-card"><div class="icon-badge ic-red">👤</div><div class="sv" id="as-sincomp" style="color:#C0392B">0</div><div class="sl">Sin comprador</div></div>
  </div>

  <div class="chart-box">
    <h3 class="chart-title">Categorías — lotes y monto generado</h3>
    <div class="chart-row">
      <div id="pie" class="pie"></div>
      <div id="legend" class="legend"></div>
    </div>
    <div id="chart-empty" class="muted" style="display:none;margin-top:.5rem">Sin datos para mostrar todavía.</div>
  </div>

<script>
  // ── Config Supabase (misma base que el index) ──
  var SUPA_URL = 'https://uybelqzyrhdhvbncypwf.supabase.co';
  var SUPA_KEY = 'sb_publishable_3PzMEHMnRa3Ag68xeUwysQ_CS4ymo8N';
  var supa = supabase.createClient(SUPA_URL, SUPA_KEY);

  // ── Parámetros recibidos por URL ──
  var P = new URLSearchParams(location.search);
  var remateId = P.get('remate') || '';
  var tc  = parseFloat(P.get('tc'))  || 6.96;
  var com = (parseFloat(P.get('com')) || 3) / 100;

  function fmt(n){ return (n||0).toLocaleString('es-BO'); }
  function setT(id,v){ var e=document.getElementById(id); if(e) e.textContent=v; }
  function showErr(msg){ var e=document.getElementById('err'); e.style.display='block'; e.textContent=msg; }

  function render(lotes){
    var cab   = lotes.reduce(function(a,l){ return a+(+l.cantidad||0); },0);
    var monto = lotes.reduce(function(a,l){ return a+(+l.precio||0)*(+l.cantidad||0); },0);
    var sinComp = lotes.filter(function(l){ return !l.comprador; }).length;
    // Comisión total = lado vendedor (com%) + lado comprador.
    // Si la compra fue "mediante otra plataforma", del 3% del comprador solo el 1% queda
    // para el remate (el 2% va a la plataforma), así que se suma al 1%.
    var comisionTot = lotes.reduce(function(a,l){
      var m=(+l.precio||0)*(+l.cantidad||0);
      var ladoComprador = l.otra_plataforma ? m*0.01 : m*com;
      return a + m*com + ladoComprador;
    },0);

    setT('as-lotes', lotes.length);
    setT('as-cabezas', cab);
    setT('as-monto', '$'+fmt(monto));
    setT('as-comision', '$'+comisionTot.toFixed(0));
    setT('as-sincomp', sinComp);

    renderPie(lotes);
  }

  var PALETTE = ['#2E75B6','#1B8A4A','#B0750A','#C0392B','#7E57C2','#00897B','#EF6C00','#5C6BC0','#D81B60','#8D6E63','#039BE5','#7CB342'];

  function renderPie(lotes){
    var pie = document.getElementById('pie');
    var legend = document.getElementById('legend');
    var emptyEl = document.getElementById('chart-empty');

    // Agrupar por categoría: cantidad de LOTES y monto generado por cada una
    var byCat = {};
    lotes.forEach(function(l){
      var cat = (l.categoria || '').toString().trim() || 'Sin categoría';
      if(!byCat[cat]) byCat[cat] = { lotes:0, monto:0 };
      byCat[cat].lotes += 1;
      byCat[cat].monto += (+l.precio||0)*(+l.cantidad||0);
    });
    var cats = Object.keys(byCat)
      .map(function(k){ return { name:k, val:byCat[k].lotes, monto:byCat[k].monto }; })
      .filter(function(c){ return c.val > 0; })
      .sort(function(a,b){ return b.val - a.val; });
    var total = cats.reduce(function(a,c){ return a + c.val; }, 0);

    if (!total) {
      pie.style.display = 'none';
      legend.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }
    pie.style.display = 'block';
    emptyEl.style.display = 'none';

    var acc = 0, stops = [], legHtml = '';
    cats.forEach(function(c, i){
      var color = PALETTE[i % PALETTE.length];
      var pct = c.val / total * 100;
      var start = acc, end = acc + pct; acc = end;
      // último segmento cierra en 100 para evitar huecos por redondeo
      if (i === cats.length - 1) end = 100;
      stops.push(color + ' ' + start.toFixed(3) + '% ' + end.toFixed(3) + '%');
      legHtml += '<div class="leg-item">' +
                 '<span class="leg-swatch" style="background:' + color + '"></span>' +
                 '<span class="leg-name">' + c.name.toLowerCase() + '</span>' +
                 '<span class="leg-val">' + pct.toFixed(1) + '% · ' + c.val + ' lote' + (c.val !== 1 ? 's' : '') + ' · $' + fmt(c.monto) + '</span>' +
                 '</div>';
    });
    pie.style.background = 'conic-gradient(' + stops.join(',') + ')';
    legend.innerHTML = legHtml;
  }

  function load(){
    if(!remateId){ showErr('No se recibió el remate. Seleccioná un remate en la barra de arriba.'); return; }
    supa.from('lotes').select('*').eq('remate_id', remateId).then(function(res){
      if(res.error){ showErr('Error al cargar: '+res.error.message); return; }
      document.getElementById('err').style.display='none';
      var lotes = (res.data||[]).filter(function(l){ return l.saved; });
      render(lotes);
    });
  }

  load();
  setInterval(load, 5000); // auto-actualiza cada 5 s
</script>
</body>
</html>
